<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <!-- ClipRelay macOS app icon — vibrant dark background with glowing mark -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop stop-color="#0D1F1C"/>
      <stop offset="1" stop-color="#071512"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop stop-color="#0F4A42"/>
      <stop offset="1" stop-color="#0A3A34"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Solid dark background (macOS will mask to squircle) -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Subtle radial highlight behind the mark -->
  <circle cx="460" cy="500" r="380" fill="#00FFD5" opacity="0.04"/>

  <!-- Mark scaled to fill icon nicely (centered, ~60% of canvas) -->
  <g transform="translate(200,155) scale(5.2)">
    <!-- Clipboard board -->
    <rect x="14" y="26" width="58" height="78" rx="10"
          fill="url(#boardGrad)" stroke="#00FFD5" stroke-width="1.8" opacity="0.95"
          filter="url(#boardGlow)"/>

    <!-- Clamp base -->
    <rect x="26" y="18" width="34" height="12" rx="5"
          fill="#0A3A34" stroke="#00FFD5" stroke-width="1.4"/>
    <!-- Clamp top -->
    <rect x="32" y="14" width="22" height="8" rx="4"
          fill="#0D4A42" stroke="#00DDC0" stroke-width="1.2"/>
    <!-- Rivet -->
    <rect x="39" y="22" width="8" height="3" rx="1.5" fill="#00FFD5" opacity="0.6"/>

    <!-- Content lines -->
    <rect x="24" y="46" width="38" height="4" rx="2" fill="#00FFD5" opacity="0.3"/>
    <rect x="24" y="56" width="27" height="4" rx="2" fill="#00FFD5" opacity="0.18"/>

    <!-- Beam arcs with glow -->
    <g filter="url(#glow)">
      <path d="M78 44 A 24 24 0 0 1 78 82" stroke="url(#arcGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M90 35 A 36 36 0 0 1 90 91" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    </g>
  </g>
</svg>
