<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- ClipRelay share menu icon — aqua circle bg, thicker arcs for small display sizes -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FFD5"/>
      <stop offset="1" stop-color="#00DDC0"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="60" cy="60" r="60" fill="url(#bgGrad)"/>

  <!-- Mark scaled into circle -->
  <g clip-path="url(#circle)" transform="translate(24,22) scale(0.6)">
    <!-- Clipboard board -->
    <rect x="14" y="26" width="58" height="78" rx="10"
          fill="rgba(0,25,22,0.65)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>

    <!-- Clamp base -->
    <rect x="26" y="18" width="34" height="12" rx="5"
          fill="rgba(0,25,22,0.6)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Clamp top -->
    <rect x="32" y="14" width="22" height="8" rx="4"
          fill="rgba(0,30,26,0.55)" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <!-- Rivet -->
    <rect x="39" y="22" width="8" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>

    <!-- Content lines -->
    <rect x="24" y="46" width="38" height="5" rx="2.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="24" y="57" width="27" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>

    <!-- Beam arcs (thicker for legibility at small sizes) -->
    <path d="M78 44 A 24 24 0 0 1 78 82" stroke="rgba(0,0,0,0.85)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M90 35 A 36 36 0 0 1 90 91" stroke="rgba(0,0,0,0.7)" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>
</svg>
