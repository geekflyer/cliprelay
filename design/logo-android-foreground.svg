<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108" fill="none">
  <!-- ClipRelay adaptive icon FOREGROUND — mark only, transparent bg.
       Centered in 108x108 adaptive-icon canvas with safe-zone padding.
       Safe zone = inner 66dp (margins of 21dp each side). -->

  <g transform="translate(16,12) scale(0.63)">
    <!-- Clipboard board -->
    <rect x="14" y="26" width="58" height="78" rx="10"
          fill="rgba(0,25,22,0.7)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

    <!-- Clamp base -->
    <rect x="26" y="18" width="34" height="12" rx="5"
          fill="rgba(0,25,22,0.65)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Clamp top -->
    <rect x="32" y="14" width="22" height="8" rx="4"
          fill="rgba(0,30,26,0.6)" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <!-- Rivet -->
    <rect x="39" y="22" width="8" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>

    <!-- Content lines (2 lines to disambiguate from battery) -->
    <rect x="24" y="46" width="38" height="5" rx="2.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="24" y="57" width="27" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>

    <!-- Beam arcs -->
    <path d="M78 44 A 24 24 0 0 1 78 82" stroke="rgba(0,0,0,0.85)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M90 35 A 36 36 0 0 1 90 91" stroke="rgba(0,0,0,0.7)" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
